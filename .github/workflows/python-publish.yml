name: Build Executables

on:
  push:
    tags:
      - 'v*'  # Запуск при создании тега v1.0, v2.1 и т.д.
  workflow_dispatch:  # Можно запустить вручную из вкладки Actions

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: my_script
            asset_name: my_script-linux
          - os: windows-latest
            artifact_name: my_script.exe
            asset_name: my_script-windows.exe
          - os: macos-latest
            artifact_name: my_script
            asset_name: my_script-macos

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          # Замените на ваш requirements.txt если есть
          # pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name my_script your_script.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/my_script${{ matrix.os == 'windows-latest' && '.exe' || '' }}
